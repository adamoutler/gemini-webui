name: Build and Publish

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch: # On-demand trigger

permissions:
  contents: read

jobs:
  setup-arch:
    name: Detect Architecture
    runs-on: ubuntu-22.04
    outputs:
      native: ${{ steps.detect.outputs.native }}
      cross: ${{ steps.detect.outputs.cross }}
    steps:
      - name: Detect and Map Arch
        id: detect
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            echo "native=linux/amd64" >> $GITHUB_OUTPUT
            echo "cross=linux/arm64" >> $GITHUB_OUTPUT
          elif [ "$ARCH" = "aarch64" ]; then
            echo "native=linux/arm64" >> $GITHUB_OUTPUT
            echo "cross=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "Unsupported arch: $ARCH" && exit 1
          fi

  build-native:
    name: Build Native Image
    needs: setup-arch
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Native Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ needs.setup-arch.outputs.native }}
          push: false
          load: true
          tags: gemini-webui:test-native
          cache-from: type=gha,scope=build-${{ needs.setup-arch.outputs.native }}
          cache-to: type=gha,mode=max,scope=build-${{ needs.setup-arch.outputs.native }}

      - name: Export Native Image
        run: docker save gemini-webui:test-native -o test-native.tar

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-native
          path: test-native.tar
          retention-days: 1

  build-cross:
    name: Build Cross Image
    needs: setup-arch
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Cross Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ needs.setup-arch.outputs.cross }}
          push: false
          outputs: type=docker,dest=test-cross.tar
          tags: gemini-webui:test-cross
          cache-from: type=gha,scope=build-${{ needs.setup-arch.outputs.cross }}
          cache-to: type=gha,mode=max,scope=build-${{ needs.setup-arch.outputs.cross }}

      - name: Upload Cross Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-cross
          path: test-cross.tar
          retention-days: 1

  test-unit:
    name: Unit Tests
    needs: build-native
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: ./setup_dev.sh

      - name: Run Unit Tests
        env:
          DATA_DIR: /tmp/data
        run: |
          PYTHONPATH=. .venv/bin/pytest -s tests/unit/

  test-e2e:
    name: E2E Tests
    needs: build-native
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: image-native

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-e2e-${{ hashFiles('**/requirements.txt', 'setup_dev.sh') }}

      - name: Parallel Environment Setup
        run: |
          # 1. Load the native image artifact in the background
          docker load -i test-native.tar &

          # 2. Pre-pull the SSH fixture over the WAN in the background
          docker pull lscr.io/linuxserver/openssh-server:latest &

          # 3. Run Python and OS setup in the foreground
          ./setup_dev.sh
          .venv/bin/playwright install-deps

          # 4. Block until background Docker tasks finish
          wait

      - name: Run E2E Tests
        env:
          DATA_DIR: /tmp/data
          TEST_SKIP_DOCKER_BUILD: "1"
          TEST_DOCKER_IMAGE: "gemini-webui:test-native"
        run: |
          PYTHONPATH=. timeout 15m .venv/bin/pytest -s tests/e2e/

  test-npm-lint:
    name: Lint & NPM Tests
    needs: build-native
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NPM dependencies
        run: npm install

      - name: Run NPM tests if any
        run: npm run test --if-present

      - name: Run pre-commit/lint
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install pre-commit
          pre-commit run --all-files

  publish:
    name: Publish and Deploy
    needs: [test-unit, test-e2e, test-npm-lint, build-cross]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Version
        id: get_version
        run: |
          BASE_VERSION=$(cat VERSION)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          NEW_VERSION="${BASE_VERSION}.${COMMIT_COUNT}"
          echo "$NEW_VERSION" > VERSION
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" src/static/manifest.json
          sed -i "s/const CACHE_NAME = .*/const CACHE_NAME = \"gemini-webui-v$NEW_VERSION\";/" src/static/sw.js
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Download Native Artifact
        uses: actions/download-artifact@v4
        with:
          name: image-native

      - name: Download Cross Artifact
        uses: actions/download-artifact@v4
        with:
          name: image-cross

      - name: Load Images into Docker
        run: |
          docker load -i test-native.tar
          docker load -i test-cross.tar

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Push Architecture-Specific Images
        run: |
          docker tag gemini-webui:test-native ghcr.io/${{ github.repository }}-dev:${{ github.sha }}-native
          docker tag gemini-webui:test-cross ghcr.io/${{ github.repository }}-dev:${{ github.sha }}-cross
          docker push ghcr.io/${{ github.repository }}-dev:${{ github.sha }}-native
          docker push ghcr.io/${{ github.repository }}-dev:${{ github.sha }}-cross

      - name: Create and Push Multi-Arch Manifests
        env:
          DOCKER_METADATA_OUTPUT_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for TAG in $DOCKER_METADATA_OUTPUT_TAGS; do
            echo "Creating manifest for $TAG"
            docker manifest create $TAG \
              --amend ghcr.io/${{ github.repository }}-dev:${{ github.sha }}-native \
              --amend ghcr.io/${{ github.repository }}-dev:${{ github.sha }}-cross
            docker manifest push $TAG
          done
