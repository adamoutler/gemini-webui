name: Build and Publish

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch: # On-demand trigger

permissions:
  contents: read

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: gemini-webui:test-build
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-unit:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: ./setup_dev.sh

      - name: Run Unit Tests
        env:
          DATA_DIR: /tmp/data
        run: |
          PYTHONPATH=. .venv/bin/pytest -s tests/unit/

  test-e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          ./setup_dev.sh
          # Install OS dependencies for Playwright
          .venv/bin/playwright install-deps

      - name: Run E2E Tests
        env:
          DATA_DIR: /tmp/data
        run: |
          PYTHONPATH=. timeout 15m .venv/bin/pytest -s tests/e2e/

  test-npm-lint:
    name: Lint & NPM Tests
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NPM dependencies
        run: npm install

      - name: Run NPM tests if any
        run: npm run test --if-present

      - name: Run pre-commit/lint
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install pre-commit
          pre-commit run --all-files

  publish:
    name: Publish and Deploy
    needs: [test-unit, test-e2e, test-npm-lint]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Version
        id: get_version
        run: |
          BASE_VERSION=$(cat VERSION)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          NEW_VERSION="${BASE_VERSION}.${COMMIT_COUNT}"
          echo "$NEW_VERSION" > VERSION
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" src/static/manifest.json
          sed -i "s/const CACHE_NAME = .*/const CACHE_NAME = \"gemini-webui-v$NEW_VERSION\";/" src/static/sw.js
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
