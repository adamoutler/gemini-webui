name: publish production

on:
  workflow_dispatch: # On-demand trigger for production

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          ./setup_dev.sh
          # Install OS dependencies for Playwright
          .venv/bin/playwright install-deps

      - name: Run tests
        env:
          DATA_DIR: /tmp/data
        run: |
          PYTHONPATH=. timeout 15m .venv/bin/pytest -s tests/

      - name: Read Version
        id: get_version
        run: |
          BASE_VERSION=$(cat VERSION)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          NEW_VERSION="${BASE_VERSION}.${COMMIT_COUNT}p"
          echo "$NEW_VERSION" > VERSION
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" src/static/manifest.json
          sed -i "s/const CACHE_NAME = .*/const CACHE_NAME = \"gemini-webui-v$NEW_VERSION\";/" src/static/sw.js
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.VERSION }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
