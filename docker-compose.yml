services:
  gemini-web:
    image: gemini-webui
    build: .
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    ports:
      - "5000:5000"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
      - LDAP_SERVER=${LDAP_SERVER}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_BIND_USER_DN=${LDAP_BIND_USER_DN}
      - LDAP_BIND_PASS=${LDAP_BIND_PASS}
      - LDAP_AUTHORIZED_GROUP=${LDAP_AUTHORIZED_GROUP}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=5000
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - data:/data
    # High-performance pure bash-builtin healthcheck (~15x faster than curl, 0 external forks)
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/5000 && builtin echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && { builtin read -r -d '' resp <&3 || true; } && [[ \"$$resp\" == *'\"status\": \"ok\"'* ]]",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  data:
