services:
  gemini-web:
    image: gemini-webui
    build: .
    ports:
      - "5000:5000"
    environment:
      - LDAP_SERVER=ldaps://192.168.1.100
      - LDAP_BASE_DN=CN=Users,DC=activedirectory,DC=adamoutler,DC=com
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AD_BIND_USER_DN=${AD_BIND_USER_DN}
      - AD_BIND_PASS=${AD_BIND_PASS}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DEFAULT_SSH_TARGET=${DEFAULT_SSH_TARGET:-adamoutler@192.168.1.101}
      - DEFAULT_SSH_DIR=${DEFAULT_SSH_DIR:-~/oc}
      - AUTHORIZED_GROUP=CN=gemini-webui,OU=Groups,dc=activedirectory,dc=adamoutler,dc=com
    volumes:
      - ~/Gemini:/app/Gemini
      - ~/.gemini:/home/node/.gemini
    restart: unless-stopped