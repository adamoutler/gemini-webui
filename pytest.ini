[pytest]
pythonpath = .
addopts = --timeout=60 -p no:anyio --cov=src --cov-report=xml --cov-report=term
timeout_func_only = false
timeout_method = signal
markers =
    prone_to_timeout: mark a test as prone to hanging, requiring strict timeout enforcement
    timeout: mark a test to timeout after a given number of seconds
filterwarnings =
    error
    ignore:.*tagMap is deprecated.*:DeprecationWarning
    ignore:.*typeMap is deprecated.*:DeprecationWarning
    ignore::DeprecationWarning:pyasn1.*
