<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini WebUI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
    <!-- SECURITY PARADIGM: Subresource Integrity (SRI) -->
    <!-- Ensures that external scripts have not been tampered with by the CDN. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" integrity="sha256-gy8/LGA7Q61DUf8ElwFQzHqHMBQnbbEmpgZcbdgeSHI=" crossorigin="anonymous" />
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif;}
        #toolbar { background-color: #333; padding: 10px; display: flex; gap: 10px; }
        button { background-color: #555; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 3px; }
        button:hover { background-color: #777; }
        #terminal-container { flex-grow: 1; padding: 5px; }
    </style>
</head>
<body>
    <div id="toolbar">
        <label style="color: white; display: flex; align-items: center; gap: 5px; margin-right: 10px;">
            <input type="checkbox" id="resume-toggle" checked> Resume
        </label>
        <button onclick="updateStatus('local'); term.clear(); socket.emit('restart', {resume: document.getElementById('resume-toggle').checked, cols: term.cols, rows: term.rows})">Restart Local</button>
        
        <input type="text" id="ssh-target" placeholder="user@host" value="{{ default_target }}" style="background:#444; color:white; border:1px solid #666; padding:5px; width:200px; margin-left: 20px;">
        <input type="text" id="ssh-dir" placeholder="/folder" value="{{ default_dir }}" style="background:#444; color:white; border:1px solid #666; padding:5px; width:150px;">
        <button onclick="updateStatus(document.getElementById('ssh-target').value); term.clear(); socket.emit('restart', {resume: document.getElementById('resume-toggle').checked, cols: term.cols, rows: term.rows, ssh_target: document.getElementById('ssh-target').value, ssh_dir: document.getElementById('ssh-dir').value})">Restart SSH</button>
        
        <button onclick="openSettings()" style="background: #2472c8;">Settings</button>

        <div id="connection-status" style="margin-left: auto; color: #0dbc79; font-weight: bold; font-family: monospace; padding: 5px 10px;"></div>
    </div>
    <div id="terminal-container"></div>

    <!-- Settings Modal -->
    <div id="settings-modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);">
        <div style="background-color: #333; color: white; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 50%; border-radius: 5px;">
            <span onclick="closeSettings()" style="float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h2>Settings</h2>
            <hr>
            <div style="margin-top: 20px;">
                <h3>Default SSH Config</h3>
                <label>Target: <input type="text" id="config-target" style="width: 100%; background: #444; color: white; border: 1px solid #666; padding: 5px; margin: 5px 0;"></label><br>
                <label>Directory: <input type="text" id="config-dir" style="width: 100%; background: #444; color: white; border: 1px solid #666; padding: 5px; margin: 5px 0;"></label><br>
                <button onclick="saveConfig()" style="margin-top: 10px; background: #0dbc79;">Save Config</button>
            </div>
            <hr style="margin-top: 20px;">
            <div style="margin-top: 20px;">
                <h3>Upload SSH Key</h3>
                <input type="file" id="ssh-key-file" style="margin: 10px 0;">
                <button onclick="uploadKey()" style="background: #2472c8;">Upload Key</button>
            </div>
        </div>
    </div>
    
    <!-- SECURITY PARADIGM: Subresource Integrity (SRI) Hashes attached -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" integrity="sha256-8K6g919IVZATrmZDwked1zfSbaQtVSTm0rcJFa5lI8c=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js" integrity="sha256-EPMZTF8XwXhvt9XbhlweyFObZzajGAY/04var3xGhI8=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha256-y6ZcVexS2AE/5ykFy1hqui8oXHHkKXk1CDE4x43QsDs=" crossorigin="anonymous"></script>
    <script>
        function updateStatus(target) {
            const statusEl = document.getElementById('connection-status');
            if (target === 'local' || !target) {
                statusEl.innerText = 'local';
                statusEl.style.color = '#2472c8';
            } else {
                // Extract hostname from user@host
                const host = target.split('@').pop();
                statusEl.innerText = 'ssh: ' + host;
                statusEl.style.color = '#0dbc79';
            }
        }

        // Initialize status with default target
        updateStatus('{{ default_target }}');

        var term = new Terminal({
            cursorBlink: true,
            macOptionIsMeta: true,
            scrollback: 10000,
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            allowProposedApi: true,
            theme: {
                background: '#1e1e1e',
                foreground: '#d4d4d4',
                cursor: '#ffffff',
                selection: '#264f78',
                black: '#000000',
                red: '#cd3131',
                green: '#0dbc79',
                yellow: '#e5e510',
                blue: '#2472c8',
                magenta: '#bc3fbc',
                cyan: '#11a8cd',
                white: '#e5e5e5',
                brightBlack: '#666666',
                brightRed: '#f14c4c',
                brightGreen: '#23d18b',
                brightYellow: '#f5f543',
                brightBlue: '#3b8eea',
                brightMagenta: '#d670d6',
                brightCyan: '#29b8db',
                brightWhite: '#e5e5e5'
            }
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        
        // Use ResizeObserver for more reliable terminal fitting
        const resizeObserver = new ResizeObserver(() => {
            try {
                fitAddon.fit();
                if (socket && socket.connected) {
                    socket.emit('resize', {cols: term.cols, rows: term.rows});
                }
            } catch (e) {
                console.error('Fit failed', e);
            }
        });
        resizeObserver.observe(document.getElementById('terminal-container'));

        var socket = io.connect(window.location.origin);

        socket.on('connect', function() {
            term.write('\r\n*** Connected to backend ***\r\n');
            // Give the DOM a moment to settle before final fit
            setTimeout(() => {
                fitAddon.fit();
                socket.emit('resize', {cols: term.cols, rows: term.rows});
            }, 50);
        });

        socket.on('disconnect', function() {
            term.write('\r\n*** Disconnected from backend ***\r\n');
        });

        socket.on('pty-output', function(data) {
            term.write(data.output);
        });

        term.onData(function(data) {
            socket.emit('pty-input', {input: data});
        });

        window.addEventListener('resize', () => {
            fitAddon.fit();
            socket.emit('resize', {cols: term.cols, rows: term.rows});
        });

        async function openSettings() {
            document.getElementById('settings-modal').style.display = 'block';
            const response = await fetch('/api/config');
            const config = await response.json();
            document.getElementById('config-target').value = config.DEFAULT_SSH_TARGET || '';
            document.getElementById('config-dir').value = config.DEFAULT_SSH_DIR || '';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function saveConfig() {
            const target = document.getElementById('config-target').value;
            const dir = document.getElementById('config-dir').value;
            const response = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ DEFAULT_SSH_TARGET: target, DEFAULT_SSH_DIR: dir })
            });
            if (response.ok) {
                alert('Config saved!');
                // Update the main UI inputs as well
                document.getElementById('ssh-target').value = target;
                document.getElementById('ssh-dir').value = dir;
            } else {
                alert('Failed to save config.');
            }
        }

        async function uploadKey() {
            const fileInput = document.getElementById('ssh-key-file');
            if (fileInput.files.length === 0) {
                alert('Please select a key file.');
                return;
            }
            const formData = new FormData();
            formData.append('key', fileInput.files[0]);
            const response = await fetch('/api/keys', {
                method: 'POST',
                body: formData
            });
            if (response.ok) {
                alert('Key uploaded successfully!');
                fileInput.value = '';
            } else {
                alert('Failed to upload key.');
            }
        }
    </script>
</body>
</html>
