<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Gemini WebUI</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <meta name="theme-color" content="#2472c8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"
      integrity="sha256-gy8/LGA7Q61DUf8ElwFQzHqHMBQnbbEmpgZcbdgeSHI="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/static/base.css?v={{ version }}" />
    <link rel="stylesheet" href="/static/mobile.css?v={{ version }}" />
    <link rel="stylesheet" href="/static/pwa.css?v={{ version }}" />
  </head>
  <body>
    <div class="ptr-indicator" id="ptr-indicator">
      <svg
        class="ptr-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
    </div>
    {% include 'partials/toolbar.html' %} {% include 'partials/tab_bar.html' %}
    {% include 'partials/install_banner.html' %} {% include
    'partials/terminal_container.html' %} {% include
    'partials/mobile_controls.html' %} {% include 'partials/modals.html' %}
    <script
      src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"
      integrity="sha256-8K6g919IVZATrmZDwked1zfSbaQtVSTm0rcJFa5lI8c="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"
      integrity="sha256-EPMZTF8XwXhvt9XbhlweyFObZzajGAY/04var3xGhI8="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"
      integrity="sha256-1nYkqw6J4dLuJ7ZMxukoP0ziBtc0NCnYfZU3CwyXGCQ="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.js"
      integrity="sha256-DJxIyTkcTO6Bbqz5Vpnb3pfozI8ZHofzpXHnPSFMjfg="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/xterm-addon-serialize@0.11.0/lib/xterm-addon-serialize.js"
      integrity="sha256-BbW7+EbR7G6sFMOjXTFzHxBa6pdGJDptqEqtWPbv8JE="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"
      integrity="sha256-y6ZcVexS2AE/5ykFy1hqui8oXHHkKXk1CDE4x43QsDs="
      crossorigin="anonymous"
    ></script>
    <script
      type="module"
      src="/static/js/mobile/index.js?v={{ version }}"
    ></script>
    <script type="module" src="/static/main.js"></script>
    <div id="version-footer" class="auto-style-a9000a">v{{ version }}</div>
  </body>
</html>
