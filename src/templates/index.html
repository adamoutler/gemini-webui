<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gemini WebUI</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <meta name="theme-color" content="#2472c8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" integrity="sha256-gy8/LGA7Q61DUf8ElwFQzHqHMBQnbbEmpgZcbdgeSHI=" crossorigin="anonymous" />
    <style>
        * { box-sizing: border-box; }
                html, body {
                    margin: 0;
                    padding: 0;
                    background-color: #000;
                    overflow: hidden; /* Stop whole page bounce */
                    height: 100%;
                    width: 100%;
                    overscroll-behavior-y: none;
                    -webkit-overflow-scrolling: touch;
                }
                body {
                    display: flex;
                    flex-direction: column;
                    position: absolute;
                    top: 0; left: 0; right: 0; bottom: 0;
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                }        #toolbar { background-color: #333; padding: 10px; display: flex; gap: 10px; align-items: center; touch-action: pan-y; }
        #tab-bar { background-color: #222; display: flex; overflow-x: auto; padding: 0 5px; touch-action: pan-x pan-y; }
        .tab { 
            padding: 8px 12px; 
            background-color: #333; 
            color: #ccc; 
            cursor: pointer; 
            border-right: 1px solid #222; 
            font-size: 13px; 
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 200px;
            min-width: 120px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }
        .tab span { 
            flex-grow: 1;
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .tab.active { 
            background-color: #1e1e1e; 
            color: white; 
            border-top: 2px solid #2472c8; 
            font-weight: bold;
            min-width: 132px;
            max-width: 220px;
        }
        .tab:hover { background-color: #444; }
        .tab-close { 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            color: #888; 
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab-close:hover { color: #f14c4c; }
        
        button { background-color: #555; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 3px; font-size: 12px;}
        button:hover { background-color: #777; }
        button.primary { background-color: #2472c8; }
        button.primary:hover { background-color: #3b8eea; }
        button.success { background-color: #0dbc79; }
        button.success:hover { background-color: #23d18b; }
        button.danger { background-color: #cd3131; }
        button.danger:hover { background-color: #f14c4c; }
        button.small { padding: 2px 8px; font-size: 11px; }
        
        #terminal-container { flex-grow: 1; padding: 0; position: relative; overflow: hidden; }
        .tab-instance { position: absolute; top: 0; left: 0; width: 100%; height: 100%; visibility: hidden; box-sizing: border-box; background: #1e1e1e;}
        .tab-instance.active { visibility: visible; }
        .terminal-instance { width: 100%; height: 100%; padding: 5px; box-sizing: border-box; direction: ltr !important; position: relative;}
        .xterm-link { text-decoration: underline !important; cursor: pointer !important; }
        
        /* Enable text selection on mobile for xterm.js */
        .xterm .xterm-viewport, .xterm .xterm-screen {
            -webkit-user-select: auto !important;
            user-select: auto !important;
            touch-action: pan-y auto !important;
        }
        
        /* Absolute Proxy Momentum Strategy */
        .mobile-scroll-proxy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            z-index: 100;
            display: none;
            -webkit-overflow-scrolling: touch;
            background: transparent;
            touch-action: pan-y;
        }
        .mobile-scroll-content {
            width: 1px;
            height: 100000px; /* Large stable height for inertia */
            background: transparent;
        }
        
        /* Quick Connect Bar */
        .quick-connect-bar {
            background: #2d2d2d;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #444;
            flex-wrap: nowrap;
        }
        .quick-connect-label { color: #3b8eea; font-weight: bold; font-size: 14px; white-space: nowrap; }
        .quick-connect-input { flex-grow: 1; margin: 0 !important; min-width: 100px; }
        .quick-connect-bar button { white-space: nowrap; flex-shrink: 0; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: #333;
            color: white;
            margin: 5% auto;
            padding: 25px;
            border: 1px solid #444;
            width: 60%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            touch-action: pan-y;
        }
        
        .launcher { padding: 30px; color: #ccc; overflow-y: auto; height: 100%; max-width: 900px; margin: 0 auto; overscroll-behavior: auto; touch-action: pan-y;}
        .launcher h2 { color: white; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-weight: 500;}
        .connection-card { background: #252526; border-radius: 6px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; transition: opacity 0.2s, transform 0.2s; }
        .connection-card:hover { border-color: #444; }
        .connection-card.dragging { 
            opacity: 0.4; 
            transform: scale(0.98);
            pointer-events: none;
        }
        
        .drag-placeholder {
            background: rgba(59, 142, 234, 0.05);
            border: 2px dashed #3b8eea;
            border-radius: 6px;
            margin-bottom: 15px;
            height: 80px;
            box-shadow: 0 0 15px rgba(59, 142, 234, 0.3);
            transition: all 0.2s ease;
        }

        .connection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
        .connection-drag-handle { 
            cursor: grab; 
            color: #666; 
            font-size: 20px; 
            padding: 0 5px; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            touch-action: none;
        }
        .connection-drag-handle:active { cursor: grabbing; }
        .connection-title { font-size: 16px; font-weight: bold; color: #fff; flex-grow: 1; }
        .connection-actions { 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            justify-content: flex-end;
            min-width: 180px; /* Ensure buttons don't squish too much */
        }
        .connection-actions button {
            flex: 1 1 85px; /* Snap to uniform size, wrap if < 85px */
            white-space: nowrap;
            text-align: center;
        }
        
        .session-list-container { margin-top: 10px; background: #1e1e1e; border-radius: 4px; overflow: hidden; border: 1px solid #2d2d2d;}
        .session-list { list-style: none; padding: 0; margin: 0; }
        .session-item { padding: 6px 12px; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 12px;}
        .session-item:last-child { border-bottom: none; }
        .session-item:hover { background: #2a2d2e; }
        .session-info { flex-grow: 1; margin-right: 15px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .session-name { color: #3b8eea; font-weight: bold; }
        
        #new-tab-btn { background-color: #2472c8; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; margin-right: 10px;}
        input[type="text"], textarea { width: 100%; background: #444; color: white; border: 1px solid #666; padding: 8px; margin: 5px 0; border-radius: 3px; box-sizing: border-box; font-family: inherit;}

                /* Mobile Controls */
                #mobile-controls {
                    display: none;
                    background: #333;
                    padding: 5px;
                    grid-template-columns: repeat(7, 1fr);
                    gap: 5px;
                    border-top: 1px solid #444;
                    flex-shrink: 0;
                    touch-action: none;
                    overscroll-behavior: none;
                    padding-bottom: env(safe-area-inset-bottom);
                }        .control-btn { 
            background: #444; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 4px; 
            padding: 8px 2px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 11px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active { background: #666; }
        .control-btn.active { background: #2472c8; border-color: #3b8eea; }
        .control-btn.danger { background: #cd3131; }
        .control-btn.danger:active { background: #f14c4c; }

        /* Modern Dark Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
            border: 2px solid #1e1e1e;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        ::-webkit-scrollbar-corner {
            background: #1e1e1e;
        }
        /* Firefox support */
        * {
            scrollbar-width: thin;
            scrollbar-color: #444 #1e1e1e;
        }

        @media (max-width: 1200px) {
            .mobile-scroll-proxy { display: block; }
            .xterm-viewport { display: none !important; }
            .modal-content { width: 98% !important; margin: 10px auto !important; padding: 10px !important; }
            
            /* Mobile Controls */
            #toolbar { padding: 5px; gap: 5px; flex-wrap: wrap; }
            #active-connection-info { gap: 5px; }
            body { height: 100%; width: 100%; position: absolute; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="new-tab-btn" onclick="addNewTab()">+ New</button>
        <div id="active-connection-info" style="display: none; align-items: center; gap: 10px;">
            <button onclick="restartActiveTab()">Restart</button>
        </div>
        <button onclick="openSettings()" style="background: #2472c8; margin-left: 10px;">Settings</button>
        <div id="connection-status" style="margin-left: auto; color: #0dbc79; font-weight: bold; font-family: monospace; padding: 5px 10px;"></div>
    </div>
    <div id="tab-bar"></div>
    <div id="terminal-container"></div>
    <div id="mobile-controls" style="display: none;">
        <div id="ctrl-toggle" class="control-btn" onclick="toggleCtrl()">Ctrl</div>
        <div class="control-btn" onclick="adjustFontSize(1)">A+</div>
        <div class="control-btn" onclick="adjustFontSize(-1)">A-</div>
        <div class="control-btn" onclick="sendToTerminal('\x1b[D')">◀</div>
        <div class="control-btn" onclick="sendToTerminal('\x1b[C')">▶</div>
        <div class="control-btn" onclick="sendToTerminal('\x1b[A')">▲</div>
        <div class="control-btn" onclick="sendToTerminal('\x1b[B')">▼</div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span onclick="closeSettings()" style="float: right; font-size: 28px; font-weight: bold; cursor: pointer; opacity: 0.7;">&times;</span>
            <h2 style="margin-top: 0;">Settings</h2>
            <div style="margin-top: 20px;">
                <h3 style="font-size: 14px; text-transform: uppercase;">Manage Hosts</h3>
                <div id="hosts-list" style="margin-bottom: 15px; border: 1px solid #444; border-radius: 4px; overflow: hidden;"></div>
                <div style="background: #2a2d2e; padding: 15px; border-radius: 4px;">
                    <div style="display: flex; gap: 5px; margin-bottom: 10px; align-items: center;">
                        <button id="add-mode-btn" class="small success" onclick="setHostMode('add')" style="opacity: 1; font-weight: bold;">[ADD]</button>
                        <button id="edit-mode-btn" class="small primary" onclick="setHostMode('edit')" style="opacity: 0.5; font-weight: normal;">[EDIT]</button>
                        <span style="font-size: 13px; margin-left: 5px; color: #ccc;">Host Configuration</span>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <input type="text" id="new-host-label" placeholder="Label eg. My Server">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <input type="text" id="new-host-target" placeholder="user@host (blank for local)">
                            <input type="text" id="new-host-dir" placeholder="Path on host eg. ~/project">
                        </div>
                    </div>
                    <button id="add-host-btn" class="success" style="margin-top: 10px; width: 100%;" onclick="submitHostForm()">Add Host</button>
                </div>
            </div>
            <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
            <div style="margin-top: 20px;">
                <h3 style="font-size: 14px; text-transform: uppercase;">Manage SSH Keys</h3>
                <ul id="key-list" style="list-style: none; padding: 0; border: 1px solid #444; border-radius: 4px; margin-bottom: 15px;"></ul>
                <div style="background: #2a2d2e; padding: 15px; border-radius: 4px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 13px;">Add Key</h4>
                    <input type="text" id="ssh-key-name" placeholder="Label eg. Personal Key">
                    <textarea id="ssh-key-text" placeholder="-----BEGIN OPENSSH PRIVATE KEY----- ..." style="height: 80px;"></textarea>
                    <button class="primary" style="width: 100%;" onclick="savePastedKey()">Save Key</button>
                </div>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
            <div id="public-key-container" style="background: #1e1e1e; padding: 15px; border: 1px solid #444; border-radius: 4px; display: none;">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
                    <div style="flex-grow: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                        <span style="font-size: 11px; color: #888; margin-right: 10px;" title="SSH key managed by this instance.">INSTANCE KEY:</span>
                        <code id="public-key-text" style="font-size: 10px; color: #0dbc79; cursor: pointer;" onclick="copyPublicKey()"></code>
                        <code id="instance-key-snippet" style="display: none;"></code>
                    </div>
                    <div style="display: flex; gap: 5px; flex-shrink: 0;">
                        <button class="small" onclick="copyPublicKey()" title="Copy the SSH public key displayed in the box.">Copy Key</button>
                        <button class="small" onclick="copyInstanceSnippet()" title="In Gemini CLI press ! to enter command mode then paste the snippet.">Copy Snippet</button>
                        <button class="small danger" onclick="rotateInstanceKey()" title="Change the SSH key.">Rotate</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="quick-add-key-modal" class="modal">
        <div class="modal-content">
            <span onclick="closeQuickAddKey()" style="float: right; font-size: 28px; font-weight: bold; cursor: pointer; opacity: 0.7;">&times;</span>
            <h2 style="margin-top: 0;">Add SSH Key & Connect</h2>
            <p id="quick-add-host-info" style="color: #3b8eea; font-family: monospace;"></p>
            <div style="background: #2a2d2e; padding: 15px; border-radius: 4px; margin-top: 15px;">
                <h4 style="margin: 0 0 10px 0; font-size: 13px;">Paste Private Key</h4>
                <input type="text" id="quick-key-name" placeholder="Key name (e.g. id_rsa_prod)">
                <textarea id="quick-key-text" placeholder="-----BEGIN OPENSSH PRIVATE KEY----- ..." style="height: 150px;"></textarea>
                <button class="primary" style="width: 100%; margin-top: 10px;" onclick="submitQuickAddKey()">Save Key & Connect</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" integrity="sha256-8K6g919IVZATrmZDwked1zfSbaQtVSTm0rcJFa5lI8c=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js" integrity="sha256-EPMZTF8XwXhvt9XbhlweyFObZzajGAY/04var3xGhI8=" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha256-y6ZcVexS2AE/5ykFy1hqui8oXHHkKXk1CDE4x43QsDs=" crossorigin="anonymous"></script>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('beforeinstallprompt event fired');
            // e.preventDefault(); // Don't prevent default, we want the browser prompt
        });

        window.addEventListener('appinstalled', (evt) => {
            console.log('Gemini WebUI was installed');
        });

        // Request Notification Permission
        if ('Notification' in window && Notification.permission === 'default') {
            document.addEventListener('click', () => {
                if (Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }, { once: true });
        }

        let tabs = [];
        let activeTabId = null;
        let initialAutoResumeDone = false;
        let ctrlActive = false;
        let launcherRefreshInterval = null;
        let titleFlashInterval = null;
        let originalPageTitle = 'Gemini WebUI';

        function updatePageTitle() {
            const hasActionRequired = tabs.some(t => t.title && t.title.includes('✋'));
            const newTitle = hasActionRequired ? '✋ Gemini WebUI' : originalPageTitle;
            
            if (document.title !== newTitle) {
                document.title = newTitle;
                
                // Flash the title once if window is not focused and action is required
                if (hasActionRequired && document.visibilityState !== 'visible') {
                    const tempTitle = 'ACTION REQUIRED';
                    let flashCount = 0;
                    if (titleFlashInterval) clearInterval(titleFlashInterval);
                    
                    titleFlashInterval = setInterval(() => {
                        document.title = (document.title === newTitle) ? tempTitle : newTitle;
                        flashCount++;
                        if (flashCount >= 2) { // Flash once (to temp and back)
                            clearInterval(titleFlashInterval);
                            document.title = newTitle;
                        }
                    }, 500);
                }
            }
        }

        function saveTabsToStorage() {
            const data = tabs.map(t => ({
                id: t.id,
                title: t.title,
                state: t.state,
                session: t.session
            }));
            sessionStorage.setItem('gemini_tabs', JSON.stringify(data));
            sessionStorage.setItem('gemini_active_tab', activeTabId);
        }

        function loadTabsFromStorage() {
            const stored = sessionStorage.getItem('gemini_tabs');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    data.forEach(t => {
                        const tab = { ...t, term: null, fitAddon: null, socket: null };
                        tabs.push(tab);
                        const container = document.createElement('div');
                        container.id = tab.id + '_instance'; container.className = 'tab-instance';
                        document.getElementById('terminal-container').appendChild(container);
                        if (tab.state === 'terminal') {
                            recreateTerminalUI(tab);
                        } else {
                            renderLauncher(tab.id);
                        }
                    });
                    activeTabId = sessionStorage.getItem('gemini_active_tab');
                    if (!tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;
                    renderTabs();
                    switchTab(activeTabId);
                    return true;
                } catch (e) { console.error("Restore failed", e); sessionStorage.clear(); }
            }
            return false;
        }

        function recreateTerminalUI(tab) {
            const container = document.getElementById(tab.id + '_instance');
            container.innerHTML = '';
            const termDiv = document.createElement('div');
            termDiv.className = 'terminal-instance';
            termDiv.id = 'rolling-log-' + tab.id;
            container.appendChild(termDiv);
            startSession(tab.id, tab.session.type, tab.session.ssh_target, tab.session.ssh_dir, tab.session.resume, tab.title);
        }

        const isMobile = window.innerWidth <= 1080 || 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        console.log("Environment detection: isMobile =", isMobile);

        window.addEventListener('popstate', (event) => {
            const activeTab = tabs.find(t => t.id === activeTabId);
            // Only hijack if we are currently in a terminal. 
            // If we are already in launcher mode, let the back button work normally.
            if (activeTab && activeTab.state === 'terminal') {
                addNewTab();
            }
        });

        const terminalTheme = {
            background: '#1e1e1e', foreground: '#d4d4d4', cursor: '#ffffff', selection: '#264f78',
            black: '#000000', red: '#cd3131', green: '#0dbc79', yellow: '#e5e510',
            blue: '#2472c8', magenta: '#bc3fbc', cyan: '#11a8cd', white: '#e5e5e5',
            brightBlack: '#666666', brightRed: '#f14c4c', brightGreen: '#23d18b',
            brightYellow: '#f5f543', brightBlue: '#3b8eea', brightMagenta: '#d670d6',
            brightCyan: '#29b8db', brightWhite: '#e5e5e5'
        };

        function updateStatus(target, dir) {
            const statusEl = document.getElementById('connection-status');
            if (target === 'local' || target === 'picker' || !target) {
                statusEl.innerText = target === 'picker' ? 'launcher' : 'local';
                statusEl.style.color = '#2472c8';
            } else {
                const host = target.split('@').pop();
                statusEl.innerText = 'ssh: ' + host + (dir ? ':' + dir : '');
                statusEl.style.color = '#0dbc79';
            }
        }

        async function addNewTab(autoResume = false) {
            // If a launcher tab already exists, just switch to it instead of creating a new one.
            const existingLauncher = tabs.find(t => t.state === 'launcher');
            if (existingLauncher) {
                switchTab(existingLauncher.id);
                return;
            }

            const id = 'tab_' + (Date.now() + Math.floor(Math.random() * 1000));
            const tab = { id, term: null, fitAddon: null, socket: null, session: null, title: 'New Tab', state: 'launcher' };
            const container = document.createElement('div');
            container.id = id + '_instance'; container.className = 'tab-instance';
            document.getElementById('terminal-container').appendChild(container);
            tabs.push(tab); renderTabs(); switchTab(id); renderLauncher(id);
            saveTabsToStorage();
        }

        async function renderLauncher(id) {
            const config = await (await fetch('/api/config')).json();
            const container = document.getElementById(id + '_instance');
            
            let warningHtml = '';
            if (!config.DATA_WRITABLE && !config.TMP_WRITABLE) {
                warningHtml = `
                    <div style="background: #cd3131; color: white; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; line-height: 1.4;">
                        <strong>CRITICAL: No writable storage found.</strong><br>
                        Both /data and /tmp are read-only. Settings and keys cannot be saved. 
                        Local sessions will not persist. Please mount a volume or enable tmpfs.
                    </div>`;
            } else if (!config.DATA_WRITABLE) {
                warningHtml = `
                    <div style="background: #e5e510; color: #000; padding: 10px; border-radius: 6px; margin-bottom: 20px; font-size: 12px;">
                        <strong>WARNING:</strong> Persistent storage (/data) is not writable. 
                        Using temporary storage. Settings will be lost on restart.
                    </div>`;
            }

            container.innerHTML = `
                <div class="launcher">
                    <h2>Select a Connection</h2>
                    <div style="font-size: 11px; color: #888; margin-bottom: 15px; background: #2a2d2e; padding: 10px; border-radius: 4px; border-left: 3px solid #3b8eea;">
                        <strong>Note:</strong> Sessions are isolated by project directory and user. 
                        If you don't see your sessions, ensure the path below matches your host project.
                    </div>
                    ${warningHtml}
                    <!-- Quick Connect Bar -->
                    <div class="quick-connect-bar">
                        <span class="quick-connect-label">ssh</span>
                        <input type="text" id="${id}_quick_input" class="quick-connect-input" placeholder="user@host:port ~/folder" onkeydown="if(event.key === 'Enter') quickConnectAction('${id}', 'connect')">
                        <button class="primary" onclick="quickConnectAction('${id}', 'key')">Add Key</button>
                        <button class="success" onclick="quickConnectAction('${id}', 'connect')">Connect</button>
                    </div>

                    <div id="${id}_connections" class="connections-list"></div>
                    
                    <div class="backend-sessions-container" style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
                        <h3 style="color: #888; margin-bottom: 15px;">Backend Managed Sessions</h3>
                        <div style="font-size: 11px; color: #666; margin-bottom: 15px;">
                            These are PTY processes running on the server. Reclaiming one will attach it to this window.
                        </div>
                        <div id="${id}_backend_sessions" class="session-list">
                            <div style="padding: 10px; color: #444; font-size: 11px;">Checking for backend sessions...</div>
                        </div>
                    </div>
                </div>`;

            const refreshManagedSessions = () => {
                const listEl = document.getElementById(`${id}_backend_sessions`);
                if (!listEl) return; // Tab closed or switched
                
                fetch('/api/management/sessions').then(r => r.json()).then(sessions => {
                    if (!sessions || sessions.length === 0) {
                        listEl.innerHTML = '<div style="padding: 10px; color: #444; font-size: 11px;">No detached sessions found on the server.</div>';
                        return;
                    }
                    let html = '';
                    sessions.forEach(s => {
                        const statusColor = s.is_orphaned ? '#888' : '#0dbc79';
                        const statusLabel = s.is_orphaned ? 'Orphaned' : 'Active';
                        html += `
                            <div class="session-item" style="background: #252526; margin-bottom: 8px; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;">
                                <div class="session-info">
                                    <div style="color: #3b8eea; font-weight: bold; font-size: 14px; margin-bottom: 2px;">Tab: ${s.title}</div>
                                    <div style="color: #888; font-size: 11px; display: flex; align-items: center; gap: 8px;">
                                        <span style="color: ${statusColor}; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                                            <span style="font-size: 14px;">●</span> ${statusLabel}
                                        </span> 
                                        <span>•</span>
                                        <span>Last seen: ${new Date(s.last_active * 1000).toLocaleTimeString()}</span>
                                    </div>
                                </div>
                                <div style="display: flex; gap: 8px;">
                                    <button class="small primary" style="padding: 6px 12px;" onclick="reclaimBackendSession('${id}', '${s.tab_id}', '${s.title}', ${JSON.stringify(s).replace(/"/g, '&quot;')})">Reclaim</button>
                                    <button class="small danger" style="padding: 6px 12px;" onclick="terminateBackendSession('${id}', '${s.tab_id}')">Terminate</button>
                                </div>
                            </div>`;
                    });
                    listEl.innerHTML = html;
                }).catch(e => console.error("Session fetch failed", e));
            };

            // Initial fetch
            refreshManagedSessions();
            
            // Set up polling while this launcher is visible
            if (launcherRefreshInterval) clearInterval(launcherRefreshInterval);
            launcherRefreshInterval = setInterval(refreshManagedSessions, 10000);

            const hosts = await (await fetch('/api/hosts')).json();
            const connContainer = document.getElementById(id + '_connections');
            let draggedCard = null;
            let placeholder = document.createElement('div');
            placeholder.className = 'drag-placeholder';

            hosts.forEach(conn => {
                const card = document.createElement('div');
                card.className = 'connection-card';
                card.dataset.label = conn.label;
                
                const sessionListId = `${id}_sessions_${conn.label.replace(/[^a-z0-9]/gi, '')}`;
                card.innerHTML = `
                    <div class="connection-header">
                        <div class="connection-drag-handle" title="Drag to reorder" draggable="true">⠿</div>
                        <div class="connection-title">
                            <div style="font-size: 18px; color: #fff; margin-bottom: 2px;">${conn.label}</div>
                            <div style="font-size: 11px; font-family: monospace; color: #888; opacity: 0.8;">${conn.target || 'local'} ${conn.dir || ''}</div>
                        </div>
                        <div class="connection-actions">
                            <button class="primary" onclick="startSession('${id}', '${conn.type}', '${conn.target || ''}', '${conn.dir || ''}', false)">Start New</button>
                            <button class="success" onclick="startSession('${id}', '${conn.type}', '${conn.target || ''}', '${conn.dir || ''}', true)">Resume Latest</button>
                        </div>
                    </div>
                    <div id="${sessionListId}" class="session-list-container"><div style="padding: 10px; color: #888; font-size: 11px;">Loading sessions...</div></div>`;
                
                const handle = card.querySelector('.connection-drag-handle');
                
                handle.addEventListener('contextmenu', (e) => e.preventDefault());

                handle.addEventListener('dragstart', (e) => {
                    draggedCard = card;
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', conn.label);
                    
                    // Set the drag image to the whole card instead of just the handle
                    const rect = card.getBoundingClientRect();
                    if (e.dataTransfer.setDragImage) {
                        e.dataTransfer.setDragImage(card, e.clientX - rect.left, e.clientY - rect.top);
                    }

                    // Use setTimeout to ensure the "dragging" class is added after the drag image is generated
                    setTimeout(() => {
                        card.classList.add('dragging');
                        card.after(placeholder);
                        placeholder.style.height = card.offsetHeight + 'px';
                    }, 0);
                });

                handle.addEventListener('dragend', () => {
                    if (!draggedCard) return;
                    draggedCard.classList.remove('dragging');
                    if (placeholder.parentNode) {
                        placeholder.replaceWith(draggedCard);
                    }
                    draggedCard = null;
                    
                    // Final background update
                    const newLabels = Array.from(connContainer.querySelectorAll('.connection-card')).map(c => c.dataset.label);
                    fetch('/api/hosts/reorder', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newLabels)
                    });
                });

                // Touch support for mobile dragging
                handle.addEventListener('touchstart', (e) => {
                    draggedCard = card;
                    placeholder.style.height = card.offsetHeight + 'px';
                    card.classList.add('dragging');
                    card.after(placeholder);
                }, { passive: false });

                handle.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (!draggedCard) return;
                    const touch = e.touches[0];
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    const overCard = target ? target.closest('.connection-card') : null;
                    
                    if (overCard && overCard !== draggedCard) {
                        const rect = overCard.getBoundingClientRect();
                        const midpoint = rect.top + rect.height / 2;
                        if (touch.clientY < midpoint) {
                            overCard.before(placeholder);
                        } else {
                            overCard.after(placeholder);
                        }
                    }
                }, { passive: false });

                handle.addEventListener('touchend', (e) => {
                    if (!draggedCard) return;
                    draggedCard.classList.remove('dragging');
                    if (placeholder.parentNode) {
                        placeholder.replaceWith(draggedCard);
                    }
                    draggedCard = null;
                    
                    const newLabels = Array.from(connContainer.querySelectorAll('.connection-card')).map(c => c.dataset.label);
                    fetch('/api/hosts/reorder', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newLabels)
                    });
                });

                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (!draggedCard || draggedCard === card) return;
                    
                    const rect = card.getBoundingClientRect();
                    const midpoint = rect.top + rect.height / 2;
                    if (e.clientY < midpoint) {
                        card.before(placeholder);
                    } else {
                        card.after(placeholder);
                    }
                });

                connContainer.appendChild(card);
                fetchSessions(id, conn, sessionListId, false, true); // Use cache first
            });
        }

        async function terminateBackendSession(launcherTabId, tabId) {
            if (!confirm(`Are you sure you want to terminate this backend session? Any unsaved work in the terminal will be lost.`)) return;
            try {
                const response = await fetch('/api/management/sessions/terminate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tab_id: tabId })
                });
                if (response.ok) {
                    // Trigger a refresh of the launcher that called this
                    renderLauncher(launcherTabId);
                } else {
                    const data = await response.json();
                    alert("Termination failed: " + (data.error || "Unknown error"));
                }
            } catch (e) { console.error(e); }
        }

        function reclaimBackendSession(id, tabId, title, session) {
            const tab = tabs.find(t => t.id === id); if (!tab) return;
            
            // Update DOM ID to match new tab ID
            const container = document.getElementById(id + '_instance');
            if (container) container.id = tabId + '_instance';
            
            if (activeTabId === id) activeTabId = tabId;
            tab.id = tabId; // Switch tab ID to the backend's ID
            tab.title = title;
            tab.state = 'terminal';
            tab.session = { 
                type: session.ssh_target ? 'ssh' : 'local', 
                ssh_target: session.ssh_target, 
                ssh_dir: session.ssh_dir, 
                resume: session.resume 
            };
            
            // Re-render tabs since we changed an ID
            renderTabs();
            saveTabsToStorage();
            recreateTerminalUI(tab);
        }

        async function fetchSessions(tabId, conn, targetId, forceAll = false, useCache = false) {
            const query = new URLSearchParams();
            if (conn.type === 'ssh') { query.set('ssh_target', conn.target); if (conn.dir) query.set('ssh_dir', conn.dir); }
            if (useCache) query.set('cache', 'true');
            try {
                const data = await (await fetch('/api/sessions?' + query.toString())).json();
                const listEl = document.getElementById(targetId); if (!listEl) return;
                if (data.error) { 
                    let errorHtml = `<div style="padding: 10px; color: #f14c4c; font-size: 11px;">Error: ${data.error}</div>`;
                    if (data.error.toLowerCase().includes('permission denied') || data.error.toLowerCase().includes('publickey')) {
                        errorHtml += `<div style="padding: 0 10px 10px 10px;"><button class="small primary" onclick="openSettings()">Setup Keys</button></div>`;
                    }
                    listEl.innerHTML = errorHtml; 
                    return; 
                }
                const sessions = parseSessions(data.output || "");
                if (sessions.length === 0) { listEl.innerHTML = `<div style="padding: 10px; color: #666; font-size: 11px; padding-left: 15px;">No active sessions found.</div>`; }
                else {
                    const sorted = sessions.reverse(); const displayCount = forceAll ? sorted.length : 3;
                    let html = '<div class="session-list">';
                    sorted.slice(0, displayCount).forEach(s => {
                        html += `<div class="session-item">
                            <div class="session-info">
                                <span class="session-name">Session: ${s.name}</span>
                                <span style="font-size: 10px; opacity: 0.7; margin-left: 10px;">(ID #${s.id} • ${s.meta})</span>
                            </div>
                            <div style="display: flex; gap: 5px;">
                                <button class="small" onclick="startSession('${tabId}', '${conn.type}', '${conn.target || ''}', '${conn.dir || ''}', '${s.id}', '${s.name.replace(/'/g, "\\'")}')">Resume</button>
                            </div>
                        </div>`;
                    });
                    if (!forceAll && sorted.length > 3) html += `<div class="session-item" style="justify-content: center; background: #252526; cursor: pointer;" onclick="fetchSessions('${tabId}', ${JSON.stringify(conn).replace(/"/g, '&quot;')}, '${targetId}', true, false)"><div style="font-size: 11px; color: #2472c8; font-weight: bold;">... Show ${sorted.length - 3} more</div></div>`;
                    listEl.innerHTML = html + '</div>';
                }
                if (useCache) fetchSessions(tabId, conn, targetId, forceAll, false); // Update after cache load
            } catch (e) { console.error(e); }
        }

        function parseSessions(output) {
            const sessions = []; const lines = output.split('\n');
            lines.forEach(line => {
                const match = line.match(/^\s+(\d+)\.\s+(.*)\s+\((.*)\)\s+\[(.*)\]/);
                if (match) sessions.push({ id: match[1], name: match[2].trim(), meta: match[3], uuid: match[4] });
            });
            return sessions;
        }

        function startSession(tabId, type, target, dir, resumeParam = true, sessionName = null) {
            const tab = tabs.find(t => t.id === tabId); if (!tab) return;
            tab.state = 'terminal'; 
            tab.session = { type, ssh_target: target, ssh_dir: dir, resume: resumeParam }; 
            tab.title = sessionName || (target ? target.split('@').pop() : 'Local');
            
            // Back button hijacking: push state so "back" has something to pop
            window.history.pushState({ terminal: true, tabId: tabId }, "");
            saveTabsToStorage();
            
            const container = document.getElementById(tabId + '_instance'); container.innerHTML = '';
            
            const termDiv = document.createElement('div'); 
            termDiv.className = 'terminal-instance'; 
            termDiv.id = 'rolling-log-' + tabId;
            termDiv.setAttribute('role', 'log');
            termDiv.setAttribute('aria-live', 'polite');
            termDiv.setAttribute('aria-relevant', 'additions');
            container.appendChild(termDiv);
            
            const isMobile = window.innerWidth <= 1080;
            const fontSize = isMobile ? 10 : 14;

            tab.term = new Terminal({ 
                cursorBlink: true, 
                cursorStyle: 'block', 
                macOptionIsMeta: true, 
                scrollback: 10000, 
                fontSize: fontSize, 
                fontFamily: 'Menlo, Monaco, "Courier New", monospace', 
                allowProposedApi: true, 
                theme: terminalTheme,
                scrollOnUserInput: true,
                scrollOnData: false
            });
            tab.fitAddon = new FitAddon.FitAddon(); tab.term.loadAddon(tab.fitAddon);
            
            tab.term.open(termDiv);

            // Passive Portal Implementation for Native Momentum
            if (isMobile) {
                const proxy = document.createElement('div');
                proxy.className = 'mobile-scroll-proxy';
                const content = document.createElement('div');
                content.className = 'mobile-scroll-content';
                proxy.appendChild(content);
                termDiv.appendChild(proxy);

                let isSyncing = false;
                const rowHeight = 16;

                // Sync: Ghost -> Terminal (Passive & Momentum-Safe)
                proxy.addEventListener('scroll', () => {
                    if (isSyncing) return;
                    isSyncing = true;
                    const deltaLines = Math.round((proxy.scrollTop - 50000) / rowHeight);
                    if (deltaLines !== 0) {
                        tab.term.scrollLines(deltaLines);
                        proxy.scrollTop = 50000; // Reset to center
                    }
                    isSyncing = false;
                }, {passive: true});

                                // Tap-through logic: Only disable when a clear tap or long-press is detected
                                let startX, startY;
                                let touchTimeout;
                                proxy.addEventListener('touchstart', (e) => {
                                    startX = e.touches[0].clientX;
                                    startY = e.touches[0].clientY;
                                    
                                    // Allow long press to pass through to xterm for text selection
                                    touchTimeout = setTimeout(() => {
                                        proxy.style.pointerEvents = 'none';
                                    }, 400); // 400ms for long press
                                }, {passive: true});
                
                                proxy.addEventListener('touchmove', (e) => {
                                    const deltaY = Math.abs(e.touches[0].clientY - startY);
                                    const deltaX = Math.abs(e.touches[0].clientX - startX);
                                    if (deltaY > 10 || deltaX > 10) {
                                        clearTimeout(touchTimeout); // It's a scroll, don't pass through
                                    }
                                }, {passive: true});
                
                                proxy.addEventListener('touchend', (e) => {
                                    clearTimeout(touchTimeout);
                                    const deltaX = Math.abs(e.changedTouches[0].clientX - startX);
                                    const deltaY = Math.abs(e.changedTouches[0].clientY - startY);

                                    if (deltaX < 10 && deltaY < 10 && proxy.style.pointerEvents !== 'none') {
                                        // This was a quick tap. Briefly open the portal.
                                        proxy.style.pointerEvents = 'none';
                                        setTimeout(() => proxy.style.pointerEvents = 'all', 150);
                                    } else {
                                        // If we disabled pointer events due to long press, DO NOT immediately restore it on touchend.
                                        // The user is lifting their finger *after* the long press triggered the selection mode.
                                        // They might now drag the selection handles. 
                                        // We need the proxy out of the way until they interact elsewhere.
                                    }
                                }, {passive: true});
                
                // Allow proxy to recover pointer events when clicking elsewhere or after selection
                document.addEventListener('selectionchange', () => {
                    const selection = window.getSelection().toString();
                    if (!selection && proxy.style.pointerEvents === 'none') {
                        // Selection cleared, safe to restore proxy
                        proxy.style.pointerEvents = 'all';
                    }
                });
                
                // Set initial position
                proxy.scrollTop = 50000;
            }

            // Passive touch listener to ensure the browser doesn't wait for JS
            // before initiating a native scroll on the viewport.
            termDiv.addEventListener('touchmove', (e) => {}, {passive: true});
            
            // Improved Web Links support with wrapped line handling
            try {
                tab.term.registerLinkProvider({
                    provideLinks(y, callback) {
                        const buffer = tab.term.buffer.active;
                        let startY = y - 1;
                        
                        // Find the start of the wrapped block
                        while (startY > 0 && buffer.getLine(startY).isWrapped) {
                            startY--;
                        }
                        
                        // Assemble full text and keep track of line offsets
                        let fullText = "";
                        let lineOffsets = [0];
                        let lineTexts = [];
                        let currentY = startY;
                        
                        while (currentY < buffer.length) {
                            const line = buffer.getLine(currentY);
                            const lineText = line.translateToString(true);
                            lineTexts.push(lineText);
                            fullText += lineText;
                            if (currentY + 1 < buffer.length && !buffer.getLine(currentY + 1).isWrapped) {
                                break;
                            }
                            currentY++;
                            lineOffsets.push(fullText.length);
                        }
                        
                        const urlRegex = /https?:\/\/[^\s"'<>^`]+[^\s"'<>^`.,!?;:]/g;
                        const links = [];
                        let match;
                        while ((match = urlRegex.exec(fullText)) !== null) {
                            const uri = match[0];
                            const matchStart = match.index;
                            const matchEnd = match.index + uri.length;
                            
                            const lineIdx = y - 1 - startY;
                            const lineStartOffset = lineOffsets[lineIdx];
                            const lineEndOffset = lineStartOffset + lineTexts[lineIdx].length;
                            
                            if (matchEnd > lineStartOffset && matchStart < lineEndOffset) {
                                const startX = Math.max(0, matchStart - lineStartOffset);
                                const endX = Math.min(lineTexts[lineIdx].length, matchEnd - lineStartOffset);
                                
                                links.push({
                                    text: uri, // Report the FULL uri even for this segment
                                    range: {
                                        start: { x: startX + 1, y: y },
                                        end: { x: endX + 1, y: y }
                                    },
                                    activate: (e, text) => {
                                        window.open(uri, '_blank', 'noopener,noreferrer');
                                    }
                                });
                            }
                        }
                        callback(links);
                    }
                });
                console.log("Custom LinkProvider registered.");
            } catch (e) {
                console.error("Failed to setup link provider:", e);
            }
            
            // The "Single Character Buffer Hack" for Android keyboards
            // We disable autocorrect and clear the buffer after each input to prevent the OS from "seeing" words to correct.
            const textarea = tab.term.textarea;
            if (textarea) {
                textarea.id = 'terminal-input-' + tabId;
                textarea.setAttribute('type', 'text');
                textarea.setAttribute('aria-autocomplete', 'none');
                textarea.setAttribute('aria-controls', 'rolling-log-' + tabId);
                textarea.setAttribute('autocomplete', 'off');
                textarea.setAttribute('autocorrect', 'off');
                textarea.setAttribute('autocapitalize', 'none');
                textarea.setAttribute('spellcheck', 'false');
                
                // Clear the input buffer immediately after xterm.js has had a chance to process it
                textarea.addEventListener('input', () => {
                    setTimeout(() => { if (textarea.value.length > 0) textarea.value = ''; }, 10);
                });
            }

            tab.socket = io.connect(window.location.origin, {
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                timeout: 20000
            });
            
            let disconnectTime = null;
            tab.socket.on('connect', () => {
                if (disconnectTime && (Date.now() - disconnectTime > 5000)) {
                    console.log("Significant downtime detected, reloading page...");
                    location.reload();
                    return;
                }
                disconnectTime = null;
                tab.term.write('\r\n\x1b[1;32m[Connected to server]\x1b[0m\r\n');
                tab.socket.emit('restart', { 
                    tab_id: tabId, 
                    reclaim: true,
                    sid: tab.socket.id,
                    resume: tab.session.resume, 
                    cols: tab.term.cols, 
                    rows: tab.term.rows, 
                    ssh_target: target, 
                    ssh_dir: dir 
                });
                setTimeout(() => { fitTerminal(tab); tab.term.focus(); }, 150);
            });

            tab.socket.on('disconnect', (reason) => {
                disconnectTime = Date.now();
                tab.term.write('\r\n\x1b[1;33m[Connection lost: ' + reason + '. Attempting to reconnect...]\x1b[0m\r\n');
                if (reason === "io server disconnect") {
                    tab.socket.connect();
                }
            });

            tab.socket.on('reconnect', (attemptNumber) => {
                tab.term.write('\r\n\x1b[1;32m[Reconnected! Total attempts: ' + attemptNumber + ']\x1b[0m\r\n');
            });

            tab.socket.on('reconnect_error', (error) => {
                console.log('Reconnection error:', error);
                // If we get a 502 (Bad Gateway) or other connection errors, the server is likely restarting
                // We should reload to get a fresh state once it's back.
                if (error && (error.message === "xhr poll error" || error.description === 502 || error.type === "TransportError")) {
                    console.log("Connection error detected, reloading page...");
                    location.reload();
                }
            });

            tab.socket.on('reconnect_failed', () => {
                tab.term.write('\r\n\x1b[1;31m[Reconnection failed. Refreshing page in 5 seconds...]\x1b[0m\r\n');
                setTimeout(() => {
                    location.reload();
                }, 5000);
            });

            tab.socket.on('pty-output', (data) => { 
                if (tab.term) {
                    tab.term.write(data.output);
                }
            });
            tab.socket.on('session-stolen', (data) => {
                if (tab.term) {
                    tab.term.write('\r\n\x1b[1;31m[Session stolen by another device]\x1b[0m\r\n');
                }
            });
            tab.term.onData((data) => { 
                if (tab.socket) {
                    if (ctrlActive && data.length === 1) {
                        const code = data.charCodeAt(0);
                        if (code >= 97 && code <= 122) { // a-z
                            tab.socket.emit('pty-input', {input: String.fromCharCode(code - 96)});
                        } else if (code >= 65 && code <= 90) { // A-Z
                            tab.socket.emit('pty-input', {input: String.fromCharCode(code - 64)});
                        } else {
                            tab.socket.emit('pty-input', {input: data});
                        }
                        toggleCtrl(false);
                    } else {
                        tab.socket.emit('pty-input', {input: data});
                    }
                }
            });
            tab.term.onTitleChange((title) => {
                tab.title = title;
                renderTabs();
                updatePageTitle();
                
                // Trigger notification if action required (✋)
                if (title.includes('✋') && document.visibilityState !== 'visible') {
                    if ('Notification' in window && Notification.permission === 'granted') {
                        navigator.serviceWorker.ready.then(registration => {
                            registration.showNotification('Gemini Action Required', {
                                body: title,
                                icon: '/static/favicon.svg',
                                tag: 'gemini-action-' + tabId,
                                renotify: true
                            });
                        });
                    }
                }
            });
            tab.term.onKey((e) => { if (e.domEvent.ctrlKey && e.domEvent.key === 'Enter') if (tab.socket) tab.socket.emit('pty-input', {input: '\x1b\r'}); });
            renderTabs(); switchTab(tabId);
        }

        function fitTerminal(tab) {
            if (!tab || tab.state !== 'terminal' || !tab.fitAddon) return;
            const oldCols = tab.term.cols;
            const oldRows = tab.term.rows;
            try {
                tab.fitAddon.fit();
                if (tab.term.cols !== oldCols || tab.term.rows !== oldRows) {
                    if (tab.socket && tab.socket.connected) {
                        tab.socket.emit('resize', {cols: tab.term.cols, rows: tab.term.rows});
                    }
                }
            } catch (e) { console.error("Fit error", e); }
        }

        function toggleCtrl(force) {
            ctrlActive = force !== undefined ? force : !ctrlActive;
            const btn = document.getElementById('ctrl-toggle');
            if (ctrlActive) btn.classList.add('active');
            else btn.classList.remove('active');
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.term) tab.term.focus();
        }

        function sendToTerminal(data) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.socket && tab.state === 'terminal') {
                tab.socket.emit('pty-input', {input: data});
                tab.term.focus();
            }
        }

        function adjustFontSize(delta) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.term) {
                const newSize = Math.max(8, Math.min(40, tab.term.options.fontSize + delta));
                tab.term.options.fontSize = newSize;
                setTimeout(() => fitTerminal(tab), 50);
            }
        }

        function switchTab(id) {
            activeTabId = id; const tab = tabs.find(t => t.id === id); if (!tab) return;
            
            if (launcherRefreshInterval) {
                clearInterval(launcherRefreshInterval);
                launcherRefreshInterval = null;
            }

            if (tab.state === 'launcher') {
                // Trigger a refresh and restart polling when switching back to launcher
                // We don't re-render the whole launcher, just the dynamic parts if they exist
                const refreshBtn = document.getElementById(`${id}_backend_sessions`);
                if (refreshBtn) {
                    // We need a way to call the refreshManagedSessions function. 
                    // I'll re-render just to be safe and simple for now.
                    renderLauncher(id);
                }
            }

            document.querySelectorAll('.tab-instance').forEach(el => el.classList.remove('active'));
            const inst = document.getElementById(id + '_instance'); if (inst) inst.classList.add('active');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            const nav = document.getElementById('nav-' + id); if (nav) nav.classList.add('active');
            const toolbarInfo = document.getElementById('active-connection-info');
            const mobileControls = document.getElementById('mobile-controls');
            saveTabsToStorage();

            if (tab.state === 'terminal') {
                toolbarInfo.style.display = 'flex';
                if (window.innerWidth <= 1080) mobileControls.style.display = 'grid';
                updateStatus(tab.session.ssh_target, tab.session.ssh_dir);
                setTimeout(() => { fitTerminal(tab); tab.term.focus(); }, 50);
            } else { 
                toolbarInfo.style.display = 'none'; 
                mobileControls.style.display = 'none';
                updateStatus('picker'); 
            }
        }

        function restartActiveTab() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.state === 'terminal') {
                const { ssh_target, ssh_dir, resume } = tab.session;
                tab.term.clear(); 
                tab.socket.emit('restart', { 
                    tab_id: tab.id, 
                    resume: resume, 
                    cols: tab.term.cols, 
                    rows: tab.term.rows, 
                    ssh_target: ssh_target, 
                    ssh_dir: ssh_dir 
                });
                updateStatus(ssh_target, ssh_dir);
            }
        }

        function closeTab(id, event) {
            if (event) event.stopPropagation(); const index = tabs.findIndex(t => t.id === id); if (index === -1) return;
            const tab = tabs[index]; if (tab.socket) tab.socket.disconnect(); if (tab.term) tab.term.dispose();
            const inst = document.getElementById(id + '_instance'); if (inst) inst.remove();
            tabs.splice(index, 1);
            if (tabs.length === 0) addNewTab();
            else { if (activeTabId === id) switchTab(tabs[Math.max(0, index - 1)].id); renderTabs(); }
            saveTabsToStorage();
        }

        function renderTabs() {
            const bar = document.getElementById('tab-bar'); bar.innerHTML = '';
            tabs.forEach(tab => {
                const el = document.createElement('div'); el.id = 'nav-' + tab.id; el.className = 'tab' + (tab.id === activeTabId ? ' active' : ''); el.onclick = () => switchTab(tab.id);
                el.innerHTML = `<span>${tab.title}</span><span class="tab-close" onclick="closeTab('${tab.id}', event)">&times;</span>`;
                bar.appendChild(el);
            });
        }

        const resizeObserver = new ResizeObserver(() => {
            tabs.forEach(tab => fitTerminal(tab));
        });
        resizeObserver.observe(document.getElementById('terminal-container'));

        // Handle mobile keyboard resizing using Visual Viewport API
        if (window.visualViewport) {
            let resizeTimeout;
            let lastViewHeight = window.visualViewport.height;
            window.visualViewport.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const viewHeight = window.visualViewport.height;
                    // Ignore tiny jitters (less than 20px) to prevent scroll interruption
                    if (Math.abs(viewHeight - lastViewHeight) < 20) return;
                    lastViewHeight = viewHeight;

                    const totalHeight = window.innerHeight;
                    const keyboardHeight = totalHeight - viewHeight;
                    
                    // Pin to visible area by adding padding to the bottom
                    document.body.style.paddingBottom = Math.max(0, keyboardHeight) + 'px';
                    
                    window.scrollTo(0, 0);
                    tabs.forEach(tab => fitTerminal(tab));
                }, 100);
            });
        }

        if (!loadTabsFromStorage()) {
            addNewTab(true);
        }

        // --- Quick Connect Logic ---
        let currentQuickTabId = null;
        let currentQuickHost = null;

        function parseQuickInput(val) {
            if (!val) return null;
            // Format: user@host[:port] [directory]
            
            let user = "";
            let host = "";
            let port = "";
            let folder = "~";

            // 1. Split by space for directory
            const spaceIdx = val.indexOf(' ');
            if (spaceIdx !== -1) {
                folder = val.substring(spaceIdx + 1).trim() || "~";
                val = val.substring(0, spaceIdx).trim();
            }

            // 2. Split for user/host
            const userParts = val.split('@');
            if (userParts.length > 1) {
                user = userParts[0];
                val = userParts[1];
            } else {
                return null; // User is required
            }

            // 3. Split for host/port
            const hostParts = val.split(':');
            host = hostParts[0];
            if (hostParts.length > 1) {
                port = hostParts[1];
            }

            if (!host) return null;

            return {
                label: host,
                type: 'ssh',
                target: port ? `${user}@${host} -p ${port}` : `${user}@${host}`,
                dir: folder
            };
        }

        async function saveHost(host) {
            await fetch('/api/hosts', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(host) 
            });
        }

        function quickConnectAction(tabId, action) {
            const input = document.getElementById(tabId + '_quick_input');
            const host = parseQuickInput(input.value);
            if (!host) return alert("Invalid format. Use user@host, user@host:port, or user@host/folder");

            currentQuickTabId = tabId;
            currentQuickHost = host;

            if (action === 'key') {
                document.getElementById('quick-add-host-info').innerText = `Connecting to: ${host.target}`;
                document.getElementById('quick-add-key-modal').style.display = 'block';
            } else {
                // Just connect
                saveHost(host).then(() => {
                    startSession(tabId, host.type, host.target, host.dir, false);
                });
            }
        }

        function closeQuickAddKey() {
            document.getElementById('quick-add-key-modal').style.display = 'none';
        }

        async function submitQuickAddKey() {
            const name = document.getElementById('quick-key-name').value;
            const text = document.getElementById('quick-key-text').value;
            if (!name || !text) return alert("Key name and text required");

            // 1. Save Key
            await fetch('/api/keys/text', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ name, key: text }) 
            });

            // 2. Save Host
            await saveHost(currentQuickHost);

            // 3. Close and Connect
            closeQuickAddKey();
            startSession(currentQuickTabId, currentQuickHost.type, currentQuickHost.target, currentQuickHost.dir, false);
        }
        // --- End Quick Connect Logic ---

                // --- Modal Management ---
                let modalMouseDownTarget = null;
                const settingsModal = document.getElementById('settings-modal');
                const quickAddModal = document.getElementById('quick-add-key-modal');
        
                [settingsModal, quickAddModal].forEach(modal => {
                    modal.addEventListener('mousedown', (e) => { modalMouseDownTarget = e.target; });
                    modal.addEventListener('mouseup', (e) => {
                        if (modalMouseDownTarget === modal && e.target === modal) {
                            if (modal === settingsModal) closeSettings();
                            else closeQuickAddKey();
                        }
                        modalMouseDownTarget = null;
                    });
                });
        
                async function openSettings() { 
         document.getElementById('settings-modal').style.display = 'block'; loadHosts(); loadKeys(); loadPublicKey(); }
        async function loadPublicKey() {
            try {
                const response = await fetch('/api/keys/public');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('public-key-text').innerText = data.key;
                    document.getElementById('instance-key-snippet').innerText = `mkdir -p ~/.ssh && echo "${data.key}" >> ~/.ssh/authorized_keys && chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys`;
                    document.getElementById('public-key-container').style.display = 'block';
                }
            } catch (e) { console.error("Could not load public key", e); }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard"));
            } else {
                // Fallback for non-secure contexts (dev environments)
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-999999px"; textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try {
                    document.execCommand('copy');
                    alert("Copied to clipboard (fallback mode)");
                } catch (err) {
                    console.error('Fallback copy failed', err);
                    alert("Copy failed. Please copy manually.");
                }
                document.body.removeChild(textArea);
            }
        }

        function copyPublicKey() {
            copyToClipboard(document.getElementById('public-key-text').innerText);
        }
        function copyInstanceSnippet() {
            copyToClipboard(document.getElementById('instance-key-snippet').innerText);
        }
        async function rotateInstanceKey() {
            if (!confirm("Are you sure you want to rotate the instance key? All remote hosts using the current key will lose access until updated with the new one.")) return;
            try {
                const response = await fetch('/api/keys/rotate', { method: 'POST' });
                if (response.ok) {
                    const data = await response.json();
                    alert("Instance key rotated successfully.");
                    loadPublicKey(); // Refresh UI
                } else {
                    const err = await response.json();
                    alert("Error rotating key: " + err.message);
                }
            } catch (e) { console.error("Rotate failed", e); }
        }
        let editingHostLabel = null;

        async function loadHosts() {
            const hosts = await (await fetch('/api/hosts')).json(); const list = document.getElementById('hosts-list'); list.innerHTML = '';
            hosts.forEach(host => {
                const item = document.createElement('div'); item.className = 'session-item';
                item.style.cursor = 'pointer';
                item.onclick = () => populateHostForm(host);
                item.innerHTML = `<div class="session-info"><span style="color:#fff; font-weight:bold;">${host.label}</span><span style="opacity:0.6; margin-left:10px;">${host.target || 'local'} ${host.dir || ''}</span></div>` + (host.label !== "local" ? `<button class="danger small" onclick="event.stopPropagation(); removeHost('${host.label}')">Delete</button>` : '');
                list.appendChild(item);
            });
        }
        function populateHostForm(host) {
            document.getElementById('new-host-label').value = host.label;
            document.getElementById('new-host-target').value = host.target || '';
            document.getElementById('new-host-dir').value = host.dir || '';
            if (host.label === 'local') {
                editingHostLabel = null;
                setHostMode('add'); // Cannot edit default local, force add mode
            } else {
                editingHostLabel = host.label;
                setHostMode('edit');
            }
        }
        function setHostMode(mode) {
            const addBtn = document.getElementById('add-mode-btn');
            const editBtn = document.getElementById('edit-mode-btn');
            const submitBtn = document.getElementById('add-host-btn');
            const labelInput = document.getElementById('new-host-label');
            
            if (mode === 'edit') {
                if (labelInput.value === 'local') {
                    alert("The default 'local' host cannot be edited. It will be used as a template for a new host.");
                    setHostMode('add');
                    return;
                }
                addBtn.style.opacity = '0.5'; addBtn.style.fontWeight = 'normal';
                editBtn.style.opacity = '1'; editBtn.style.fontWeight = 'bold';
                submitBtn.innerText = 'Update Host';
                submitBtn.className = 'primary';
            } else {
                editingHostLabel = null;
                addBtn.style.opacity = '1'; addBtn.style.fontWeight = 'bold';
                editBtn.style.opacity = '0.5'; editBtn.style.fontWeight = 'normal';
                submitBtn.innerText = 'Add Host';
                submitBtn.className = 'success';
            }
        }
        function clearHostForm() {
            document.getElementById('new-host-label').value = '';
            document.getElementById('new-host-target').value = '';
            document.getElementById('new-host-dir').value = '';
            editingHostLabel = null;
            setHostMode('add');
        }
        async function submitHostForm() {
            const label = document.getElementById('new-host-label').value; 
            const target = document.getElementById('new-host-target').value; 
            const dir = document.getElementById('new-host-dir').value;
            const submitBtn = document.getElementById('add-host-btn');
            
            if (!label) return alert("Label required");
            if (label === 'local' && submitBtn.innerText === 'Update Host') {
                return alert("Cannot update protected 'local' host.");
            }

            const host = { 
                label, 
                type: target ? 'ssh' : 'local', 
                target, 
                dir,
                old_label: editingHostLabel // Pass to server for in-place update
            };
            
            const response = await fetch('/api/hosts', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(host) 
            });

            if (response.ok) {
                const originalText = submitBtn.innerText;
                submitBtn.innerText = originalText + " ✓";
                setTimeout(() => { submitBtn.innerText = originalText; }, 2000);
                
                editingHostLabel = label; // Update current tracking
                loadHosts();
            } else {
                alert("Failed to save host.");
            }
        }
        async function removeHost(label) { if (!confirm(`Remove host ${label}?`)) return; await fetch(`/api/hosts/${encodeURIComponent(label)}`, { method: 'DELETE' }); loadHosts(); }
        async function loadKeys() {
            const keys = await (await fetch('/api/keys')).json(); const list = document.getElementById('key-list'); list.innerHTML = '';
            if (keys.length === 0) list.innerHTML = '<li style="padding:10px; color:#666;">No keys found.</li>';
            keys.forEach(key => {
                const li = document.createElement('li'); li.className = 'session-item';
                li.innerHTML = `<div class="session-info">${key}</div><button class="danger small" onclick="removeKey('${key}')">Delete</button>`;
                list.appendChild(li);
            });
        }
        async function removeKey(filename) { if (!confirm(`Delete key ${filename}?`)) return; await fetch(`/api/keys/${filename}`, { method: 'DELETE' }); loadKeys(); }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; tabs.forEach(t => { if (t.state === 'launcher') renderLauncher(t.id); }); }
        async function savePastedKey() {
            const name = document.getElementById('ssh-key-name').value; const text = document.getElementById('ssh-key-text').value;
            if (!name || !text) return alert("Name and key text required");
            await fetch('/api/keys/text', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, key: text }) });
            document.getElementById('ssh-key-name').value = ''; document.getElementById('ssh-key-text').value = ''; loadKeys();
        }

        // Prevent iOS/Android pull-to-refresh or page slide when swiping on controls
        const mobileControlsContainer = document.getElementById('mobile-controls');
        if (mobileControlsContainer) {
            mobileControlsContainer.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        }
    </script>
