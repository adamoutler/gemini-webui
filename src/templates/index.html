<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini WebUI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" integrity="sha256-gy8/LGA7Q61DUf8ElwFQzHqHMBQnbbEmpgZcbdgeSHI=" crossorigin="anonymous" />
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;}
        #toolbar { background-color: #333; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #tab-bar { background-color: #222; display: flex; overflow-x: auto; padding: 0 5px; }
        .tab { 
            padding: 8px 15px; 
            background-color: #333; 
            color: #ccc; 
            cursor: pointer; 
            border-right: 1px solid #222; 
            font-size: 13px; 
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab.active { background-color: #1e1e1e; color: white; border-bottom: 1px solid #2472c8; }
        .tab:hover { background-color: #444; }
        .tab-close { font-weight: bold; font-size: 16px; cursor: pointer; color: #888; }
        .tab-close:hover { color: #f14c4c; }
        
        button { background-color: #555; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 3px; font-size: 12px;}
        button:hover { background-color: #777; }
        button.primary { background-color: #2472c8; }
        button.primary:hover { background-color: #3b8eea; }
        button.success { background-color: #0dbc79; }
        button.success:hover { background-color: #23d18b; }
        button.small { padding: 2px 8px; font-size: 11px; }
        
        #terminal-container { flex-grow: 1; padding: 0; position: relative; }
        .tab-instance { position: absolute; top: 0; left: 0; width: 100%; height: 100%; visibility: hidden; box-sizing: border-box; background: #1e1e1e;}
        .tab-instance.active { visibility: visible; }
        .terminal-instance { width: 100%; height: 100%; padding: 5px; box-sizing: border-box; }
        
        /* Launcher Styles */
        .launcher { padding: 30px; color: #ccc; overflow-y: auto; height: 100%; max-width: 900px; margin: 0 auto;}
        .launcher h2 { color: white; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-weight: 500;}
        .connection-card { background: #252526; border-radius: 6px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .connection-card:hover { border-color: #444; }
        .connection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .connection-title { font-size: 16px; font-weight: bold; color: #fff; }
        .connection-actions { display: flex; gap: 8px; }
        
        .session-list-container { margin-top: 10px; background: #1e1e1e; border-radius: 4px; overflow: hidden; border: 1px solid #2d2d2d;}
        .session-list { list-style: none; padding: 0; margin: 0; }
        .session-item { padding: 6px 12px; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 12px;}
        .session-item:last-child { border-bottom: none; }
        .session-item:hover { background: #2a2d2e; }
        .session-info { flex-grow: 1; margin-right: 15px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .session-name { color: #3b8eea; font-weight: bold; }
        
        #new-tab-btn { background-color: #2472c8; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; margin-right: 10px;}
    </style>
</head>
<body>
    <div id="toolbar">
        <button id="new-tab-btn" onclick="addNewTab()">+ New</button>
        
        <div id="active-connection-info" style="display: none; align-items: center; gap: 10px;">
            <button onclick="restartActiveTab()">Restart</button>
            <input type="text" id="ssh-target" placeholder="user@host" style="background:#444; color:white; border:1px solid #666; padding:5px; width:200px; margin-left: 20px;">
            <input type="text" id="ssh-dir" placeholder="/folder" style="background:#444; color:white; border:1px solid #666; padding:5px; width:150px;">
        </div>

        <button onclick="openSettings()" style="background: #2472c8; margin-left: 10px;">Settings</button>

        <div id="connection-status" style="margin-left: auto; color: #0dbc79; font-weight: bold; font-family: monospace; padding: 5px 10px;"></div>
    </div>
    <div id="tab-bar"></div>
    <div id="terminal-container"></div>

    <!-- Settings Modal -->
    <div id="settings-modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);">
        <div style="background-color: #333; color: white; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 50%; border-radius: 5px;">
            <span onclick="closeSettings()" style="float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            <h2>Settings</h2>
            <hr>
            <div style="margin-top: 20px;">
                <h3>Default SSH Config</h3>
                <label>Target: <input type="text" id="config-target" style="width: 100%; background: #444; color: white; border: 1px solid #666; padding: 5px; margin: 5px 0;"></label><br>
                <label>Directory: <input type="text" id="config-dir" style="width: 100%; background: #444; color: white; border: 1px solid #666; padding: 5px; margin: 5px 0;"></label><br>
                <button onclick="saveConfig()" style="margin-top: 10px; background: #0dbc79;">Save Config</button>
            </div>
            <hr style="margin-top: 20px;">
            <div style="margin-top: 20px;">
                <h3>Upload SSH Key</h3>
                <input type="file" id="ssh-key-file" style="margin: 10px 0;">
                <button onclick="uploadKey()" style="background: #2472c8;">Upload Key</button>
            </div>
            <hr style="margin-top: 20px;">
            <div style="margin-top: 20px;">
                <h3>Paste Private Key</h3>
                <input type="text" id="ssh-key-name" placeholder="Key name (e.g. my_server)" style="width: 100%; background: #444; color: white; border: 1px solid #666; padding: 5px; margin: 5px 0;">
                <textarea id="ssh-key-text" placeholder="-----BEGIN OPENSSH PRIVATE KEY----- ..." style="width: 100%; height: 100px; background: #444; color: white; border: 1px solid #666; padding: 5px; margin: 5px 0; font-family: monospace;"></textarea>
                <button onclick="savePastedKey()" style="background: #2472c8;">Save Pasted Key</button>
            </div>
            <hr style="margin-top: 20px;">
            <div style="margin-top: 20px;">
                <h3>Manage Keys</h3>
                <ul id="key-list" style="list-style: none; padding: 0;"></ul>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" integrity="sha256-8K6g919IVZATrmZDwked1zfSbaQtVSTm0rcJFa5lI8c=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js" integrity="sha256-EPMZTF8XwXhvt9XbhlweyFObZzajGAY/04var3xGhI8=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha256-y6ZcVexS2AE/5ykFy1hqui8oXHHkKXk1CDE4x43QsDs=" crossorigin="anonymous"></script>
    <script>
        let tabs = [];
        let activeTabId = null;
        let sessionCache = {}; // Cache for session lists: key -> {timestamp, data}

        const terminalTheme = {
            background: '#1e1e1e',
            foreground: '#d4d4d4',
            cursor: '#ffffff',
            selection: '#264f78',
            black: '#000000',
            red: '#cd3131',
            green: '#0dbc79',
            yellow: '#e5e510',
            blue: '#2472c8',
            magenta: '#bc3fbc',
            cyan: '#11a8cd',
            white: '#e5e5e5',
            brightBlack: '#666666',
            brightRed: '#f14c4c',
            brightGreen: '#23d18b',
            brightYellow: '#f5f543',
            brightBlue: '#3b8eea',
            brightMagenta: '#d670d6',
            brightCyan: '#29b8db',
            brightWhite: '#e5e5e5'
        };

        const standardConnections = [
            { label: 'Local Box', type: 'local' },
            { label: 'OC Box (101)', type: 'ssh', target: 'adamoutler@192.168.1.101', dir: '~/oc' },
            { label: 'WebUI Dev (101)', type: 'ssh', target: 'adamoutler@192.168.1.101', dir: '~/gemini-webui' }
        ];

        function updateStatus(target, dir) {
            const statusEl = document.getElementById('connection-status');
            if (target === 'local' || target === 'picker' || !target) {
                statusEl.innerText = target === 'picker' ? 'launcher' : 'local';
                statusEl.style.color = '#2472c8';
            } else {
                const host = target.split('@').pop();
                statusEl.innerText = 'ssh: ' + host + (dir ? ':' + dir : '');
                statusEl.style.color = '#0dbc79';
            }
        }

        function addNewTab() {
            const id = 'tab_' + Date.now();
            const tab = {
                id: id,
                term: null,
                fitAddon: null,
                socket: null,
                session: null,
                title: 'New Tab',
                state: 'launcher' 
            };

            const container = document.createElement('div');
            container.id = id + '_instance';
            container.className = 'tab-instance';
            document.getElementById('terminal-container').appendChild(container);

            tabs.push(tab);
            renderTabs();
            switchTab(id);
            renderLauncher(id);
            
            // Trigger background session pre-loading
            standardConnections.forEach(conn => prefetchSessions(conn));
        }

        function renderLauncher(id) {
            const container = document.getElementById(id + '_instance');
            container.innerHTML = `
                <div class="launcher">
                    <h2>Select a Connection</h2>
                    <div id="${id}_connections"></div>
                </div>
            `;
            
            const connContainer = document.getElementById(id + '_connections');
            standardConnections.forEach(conn => {
                const card = document.createElement('div');
                card.className = 'connection-card';
                const sanitizedLabel = conn.label.replace(/[^a-z0-9]/gi, '');
                const sessionListId = `${id}_sessions_${sanitizedLabel}`;
                
                card.innerHTML = `
                    <div class="connection-header">
                        <div class="connection-title">${conn.label} ${conn.target ? '(' + conn.target + ')' : ''}</div>
                        <div class="connection-actions">
                            <button class="primary" onclick="startSession('${id}', '${conn.type}', '${conn.target || ''}', '${conn.dir || ''}', false)">Start New</button>
                            <button class="success" onclick="startSession('${id}', '${conn.type}', '${conn.target || ''}', '${conn.dir || ''}', true)">Resume Latest</button>
                        </div>
                    </div>
                    <div id="${sessionListId}" class="session-list-container">
                        <div style="padding: 10px; color: #888;">Loading sessions...</div>
                    </div>
                `;
                connContainer.appendChild(card);
                fetchSessions(id, conn, sessionListId);
            });
        }

        function getCacheKey(conn) {
            return `${conn.type}:${conn.target || 'local'}:${conn.dir || ''}`;
        }

        async function prefetchSessions(conn) {
            const key = getCacheKey(conn);
            const query = new URLSearchParams();
            if (conn.type === 'ssh') {
                query.set('ssh_target', conn.target);
                if (conn.dir) query.set('ssh_dir', conn.dir);
            }
            try {
                const response = await fetch('/api/sessions?' + query.toString());
                const data = await response.json();
                sessionCache[key] = { timestamp: Date.now(), data: data };
            } catch (e) { console.error("Prefetch failed", e); }
        }

        async function fetchSessions(tabId, conn, targetId, forceAll = false) {
            const key = getCacheKey(conn);
            let data;
            
            // Use cache if fresh (under 10s)
            if (sessionCache[key] && (Date.now() - sessionCache[key].timestamp < 10000)) {
                data = sessionCache[key].data;
            } else {
                const query = new URLSearchParams();
                if (conn.type === 'ssh') {
                    query.set('ssh_target', conn.target);
                    if (conn.dir) query.set('ssh_dir', conn.dir);
                }
                try {
                    const response = await fetch('/api/sessions?' + query.toString());
                    data = await response.json();
                    sessionCache[key] = { timestamp: Date.now(), data: data };
                } catch (e) {
                    console.error(e);
                    data = { error: "Network error" };
                }
            }

            const listEl = document.getElementById(targetId);
            if (!listEl) return;
            
            if (data.error) {
                listEl.innerHTML = `<div style="padding: 10px; color: #f14c4c; font-size: 11px;">Error: ${data.error}</div>`;
                return;
            }

            const sessions = parseSessions(data.output || "");
            if (sessions.length === 0) {
                listEl.innerHTML = `<div style="padding: 10px; color: #666; font-size: 11px;">No active sessions found.</div>`;
            } else {
                // Reverse to newest first
                const sorted = sessions.reverse();
                const displayCount = forceAll ? sorted.length : 3;
                
                let html = '<div class="session-list">';
                sorted.slice(0, displayCount).forEach(s => {
                    html += `
                        <div class="session-item">
                            <div class="session-info">
                                <span class="session-name">#${s.id}: ${s.name}</span>
                                <span style="font-size: 10px; opacity: 0.7; margin-left: 10px;">(${s.meta})</span>
                            </div>
                            <button class="small" onclick="startSession('${tabId}', '${conn.type}', '${conn.target || ''}', '${conn.dir || ''}', '${s.id}')">Resume</button>
                        </div>
                    `;
                });
                
                if (!forceAll && sorted.length > 3) {
                    html += `
                        <div class="session-item" style="justify-content: center; background: #252526; cursor: pointer;" onclick="fetchSessions('${tabId}', ${JSON.stringify(conn).replace(/"/g, '&quot;')}, '${targetId}', true)">
                            <div style="font-size: 11px; color: #2472c8; font-weight: bold;">... Show ${sorted.length - 3} more</div>
                        </div>
                    `;
                }
                
                html += '</div>';
                listEl.innerHTML = html;
            }
        }

        function parseSessions(output) {
            const sessions = [];
            const lines = output.split('\n');
            lines.forEach(line => {
                const match = line.match(/^\s+(\d+)\.\s+(.*)\s+\((.*)\)\s+\[(.*)\]/);
                if (match) {
                    sessions.push({
                        id: match[1],
                        name: match[2].trim(),
                        meta: match[3],
                        uuid: match[4]
                    });
                }
            });
            return sessions;
        }

        function startSession(tabId, type, target, dir, resumeParam = true) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab) return;
            
            tab.state = 'terminal';
            tab.session = { type, ssh_target: target, ssh_dir: dir };
            tab.title = target ? target.split('@').pop() : 'Local';
            
            const container = document.getElementById(tabId + '_instance');
            container.innerHTML = ''; 
            
            const termDiv = document.createElement('div');
            termDiv.className = 'terminal-instance';
            container.appendChild(termDiv);

            tab.term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                macOptionIsMeta: true,
                scrollback: 10000,
                fontSize: 14,
                fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                allowProposedApi: true,
                theme: terminalTheme
            });
            tab.fitAddon = new FitAddon.FitAddon();
            tab.term.loadAddon(tab.fitAddon);
            tab.term.open(termDiv);

            tab.socket = io.connect(window.location.origin);
            
            tab.socket.on('connect', () => {
                tab.socket.emit('restart', {
                    resume: resumeParam,
                    cols: tab.term.cols,
                    rows: tab.term.rows,
                    ssh_target: target,
                    ssh_dir: dir
                });
                setTimeout(() => {
                    if (tab.fitAddon) {
                        tab.fitAddon.fit();
                        tab.socket.emit('resize', {cols: tab.term.cols, rows: tab.term.rows});
                    }
                    tab.term.focus();
                }, 100);
            });

            tab.socket.on('pty-output', (data) => {
                if (tab.term) tab.term.write(data.output);
            });

            tab.term.onData((data) => {
                if (tab.socket) tab.socket.emit('pty-input', {input: data});
            });

            tab.term.onKey((e) => {
                const ev = e.domEvent;
                if (ev.ctrlKey && ev.key === 'Enter') {
                    if (tab.socket) tab.socket.emit('pty-input', {input: '\x1b\r'});
                }
            });

            renderTabs();
            switchTab(tabId);
        }

        function switchTab(id) {
            activeTabId = id;
            const tab = tabs.find(t => t.id === id);
            if (!tab) return;
            
            document.querySelectorAll('.tab-instance').forEach(el => el.classList.remove('active'));
            const inst = document.getElementById(id + '_instance');
            if (inst) inst.classList.add('active');
            
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            const nav = document.getElementById('nav-' + id);
            if (nav) nav.classList.add('active');

            const toolbarInfo = document.getElementById('active-connection-info');
            if (tab.state === 'terminal') {
                toolbarInfo.style.display = 'flex';
                document.getElementById('ssh-target').value = tab.session.ssh_target || '';
                document.getElementById('ssh-dir').value = tab.session.ssh_dir || '';
                updateStatus(tab.session.ssh_target, tab.session.ssh_dir);
                setTimeout(() => {
                    if (tab.fitAddon) {
                        tab.fitAddon.fit();
                        tab.socket.emit('resize', {cols: tab.term.cols, rows: tab.term.rows});
                        tab.term.focus();
                    }
                }, 0);
            } else {
                toolbarInfo.style.display = 'none';
                updateStatus('picker');
            }
        }

        function restartActiveTab() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.state === 'terminal') {
                const target = document.getElementById('ssh-target').value;
                const dir = document.getElementById('ssh-dir').value;
                tab.session = { type: target ? 'ssh' : 'local', ssh_target: target, ssh_dir: dir };
                tab.term.clear();
                tab.socket.emit('restart', {
                    resume: true,
                    cols: tab.term.cols, rows: tab.term.rows,
                    ssh_target: target, ssh_dir: dir
                });
                updateStatus(target, dir);
            }
        }

        function closeTab(id, event) {
            if (event) event.stopPropagation();
            const index = tabs.findIndex(t => t.id === id);
            if (index === -1) return;

            const tab = tabs[index];
            if (tab.socket) tab.socket.disconnect();
            if (tab.term) tab.term.dispose();
            const inst = document.getElementById(id + '_instance');
            if (inst) inst.remove();
            
            tabs.splice(index, 1);
            
            if (tabs.length === 0) {
                addNewTab();
            } else {
                if (activeTabId === id) {
                    switchTab(tabs[Math.max(0, index - 1)].id);
                }
                renderTabs();
            }
        }

        function renderTabs() {
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = '';
            tabs.forEach(tab => {
                const el = document.createElement('div');
                el.id = 'nav-' + tab.id;
                el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
                el.onclick = () => switchTab(tab.id);
                el.innerHTML = `
                    <span>${tab.title}</span>
                    <span class="tab-close" onclick="closeTab('${tab.id}', event)">&times;</span>
                `;
                bar.appendChild(el);
            });
        }

        const resizeObserver = new ResizeObserver(() => {
            tabs.forEach(tab => {
                if (tab.state === 'terminal' && tab.fitAddon) {
                    try {
                        tab.fitAddon.fit();
                        if (tab.socket && tab.socket.connected) {
                            tab.socket.emit('resize', {cols: tab.term.cols, rows: tab.term.rows});
                        }
                    } catch (e) {}
                }
            });
        });
        resizeObserver.observe(document.getElementById('terminal-container'));

        addNewTab();

        async function openSettings() {
            document.getElementById('settings-modal').style.display = 'block';
            const response = await fetch('/api/config');
            const config = await response.json();
            document.getElementById('config-target').value = config.DEFAULT_SSH_TARGET || '';
            document.getElementById('config-dir').value = config.DEFAULT_SSH_DIR || '';
            loadKeys();
        }

        async function loadKeys() {
            const response = await fetch('/api/keys');
            const keys = await response.json();
            const list = document.getElementById('key-list');
            if (!list) return;
            list.innerHTML = '';
            keys.forEach(key => {
                const li = document.createElement('li');
                li.style.display = 'flex';
                li.style.justifyContent = 'space-between';
                li.style.alignItems = 'center';
                li.style.margin = '5px 0';
                li.innerHTML = `
                    <span>${key}</span>
                    <button onclick="removeKey('${key}')" style="background: #cd3131; padding: 2px 10px; font-size: 12px;">Remove</button>
                `;
                list.appendChild(li);
            });
        }

        async function removeKey(filename) {
            if (!confirm(`Are you sure you want to remove ${filename}?`)) return;
            const response = await fetch(`/api/keys/${filename}`, { method: 'DELETE' });
            if (response.ok) {
                loadKeys();
            } else {
                alert('Failed to remove key.');
            }
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        async function saveConfig() {
            const target = document.getElementById('config-target').value;
            const dir = document.getElementById('config-dir').value;
            const response = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ DEFAULT_SSH_TARGET: target, DEFAULT_SSH_DIR: dir })
            });
            if (response.ok) {
                alert('Config saved!');
            } else {
                alert('Failed to save config.');
            }
        }

        async function uploadKey() {
            const fileInput = document.getElementById('ssh-key-file');
            if (fileInput.files.length === 0) {
                alert('Please select a key file.');
                return;
            }
            const formData = new FormData();
            formData.append('key', fileInput.files[0]);
            const response = await fetch('/api/keys', {
                method: 'POST',
                body: formData
            });
            if (response.ok) {
                alert('Key uploaded successfully!');
                fileInput.value = '';
                loadKeys();
            } else {
                alert('Failed to upload key.');
            }
        }

        async function savePastedKey() {
            const name = document.getElementById('ssh-key-name').value;
            const text = document.getElementById('ssh-key-text').value;
            if (!name || !text) {
                alert('Please provide both a name and the key text.');
                return;
            }
            const response = await fetch('/api/keys/text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, key: text })
            });
            if (response.ok) {
                alert('Key saved successfully!');
                document.getElementById('ssh-key-name').value = '';
                document.getElementById('ssh-key-text').value = '';
                loadKeys();
            } else {
                alert('Failed to save key.');
            }
        }
    </script>
</body>
</html>
