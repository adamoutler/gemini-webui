<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shared Terminal Session: {{ session_name }}</title>
<style>
  :root {
    --bg-color: #1e1e1e; /* Dark (default) */
    --text-color: #cccccc;
  }
  body.theme-light {
    --bg-color: #ffffff;
    --text-color: #333333; /* Dark Grey text */
  }
  body.theme-dark {
    --bg-color: #1e1e1e; /* Dark Grey background */
    --text-color: #cccccc; /* Light Grey text */
  }
  body.theme-full {
    --bg-color: #1e1e1e;
    --text-color: #cccccc;
  }
  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 0;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .terminal-wrapper {
    width: 100%;
    /* No max-width, make it full screen */
    background-color: var(--bg-color);
    padding: 10px;
    box-sizing: border-box;
    overflow-x: auto;
  }

  .terminal-wrapper pre, .terminal-wrapper div {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: inherit;
    line-height: 1.2;
}
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: inherit;
    line-height: 1.2;
  }
</style>
</head>
<body class="theme-{{ theme }}">
<div class="terminal-wrapper">
{{ html_content | safe }}
</div>
</body>
</html>
