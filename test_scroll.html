<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  </head>
  <body>
    <div id="terminal" style="height: 300px; width: 500px"></div>
    <script>
      var term = new Terminal({ scrollback: 10000 });
      term.open(document.getElementById("terminal"));
      term.write("Line 1\r\nLine 2\r\nLine 3\r\n");
      setTimeout(() => {
        term.clear();
        term.write("Line A\r\nLine B\r\n", () => {
          term.scrollToBottom();
        });
      }, 1000);
    </script>
  </body>
</html>
